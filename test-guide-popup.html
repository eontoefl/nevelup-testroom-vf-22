<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>과제 안내 팝업 디자인 테스트</title>
    <link href="https://fonts.googleapis.com/css2?family=Pretendard+Variable:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Pretendard Variable', Pretendard, sans-serif;
            background: #f0f2f5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 40px 20px;
        }

        h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 8px;
        }

        .demo-btn {
            padding: 12px 28px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .demo-btn:active { transform: scale(0.97); }

        .btn-step1 { background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff; }
        .btn-step2 { background: linear-gradient(135deg, #3b82f6, #60a5fa); color: #fff; }
        .btn-step3 { background: linear-gradient(135deg, #22c55e, #4ade80); color: #fff; }

        /* ========== 팝업 오버레이 ========== */
        .guide-popup-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 99999;
            align-items: center;
            justify-content: center;
            padding: 20px;
            animation: gpFadeIn 0.2s ease;
        }
        .guide-popup-overlay.active {
            display: flex;
        }

        @keyframes gpFadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        @keyframes gpSlideUp {
            from { opacity: 0; transform: translateY(24px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        /* ========== 팝업 본체 ========== */
        .guide-popup {
            background: #fff;
            border-radius: 20px;
            max-width: 420px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 24px 64px rgba(0, 0, 0, 0.2);
            animation: gpSlideUp 0.3s ease;
        }

        /* 상단 아이콘 영역 */
        .guide-popup-icon {
            padding: 32px 24px 16px;
            text-align: center;
        }
        .guide-popup-icon span {
            font-size: 52px;
            display: inline-block;
            animation: gpBounce 0.5s ease 0.2s both;
        }
        @keyframes gpBounce {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.15); }
            100% { transform: scale(1); opacity: 1; }
        }

        /* 본문 */
        .guide-popup-body {
            padding: 0 28px 24px;
            text-align: center;
        }
        .guide-popup-title {
            font-size: 19px;
            font-weight: 700;
            color: #1a1a1a;
            margin-bottom: 12px;
            line-height: 1.4;
        }
        .guide-popup-desc {
            font-size: 14px;
            color: #555;
            line-height: 1.7;
        }
        .guide-popup-desc b {
            color: #1a1a1a;
        }

        /* 주의사항 박스 */
        .guide-popup-notice {
            margin: 16px 0 0;
            background: #fef3c7;
            border-radius: 10px;
            padding: 12px 14px;
            font-size: 13px;
            color: #92400e;
            line-height: 1.6;
            text-align: left;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .guide-popup-notice span {
            flex-shrink: 0;
            font-size: 16px;
        }

        /* 버튼 */
        .guide-popup-btn-wrap {
            padding: 0 28px 28px;
        }
        .guide-popup-btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
            font-family: inherit;
            color: #fff;
            transition: transform 0.15s, box-shadow 0.15s;
        }
        .guide-popup-btn:active {
            transform: scale(0.97);
        }

        /* 색상 테마 */
        .theme-purple .guide-popup-btn { background: linear-gradient(135deg, #6366f1, #8b5cf6); box-shadow: 0 4px 16px rgba(99, 102, 241, 0.35); }
        .theme-blue .guide-popup-btn { background: linear-gradient(135deg, #3b82f6, #60a5fa); box-shadow: 0 4px 16px rgba(59, 130, 246, 0.35); }
        .theme-green .guide-popup-btn { background: linear-gradient(135deg, #22c55e, #4ade80); box-shadow: 0 4px 16px rgba(34, 197, 94, 0.35); }
    </style>
</head>
<body>

    <h2>🎨 과제 안내 팝업 디자인 테스트</h2>
    <p style="color:#888; font-size:14px; margin-bottom:20px;">아래 버튼을 눌러 각 시점의 팝업을 확인하세요</p>

    <button class="demo-btn btn-step1" onclick="showPopup('step1')">① 1차 풀이 시작</button>
    <button class="demo-btn btn-step2" onclick="showPopup('step2')">② 2차 풀이 시작</button>
    <button class="demo-btn btn-step3" onclick="showPopup('step3')">③ 해설 + 오답노트</button>

    <!-- ========== 팝업 오버레이 ========== -->
    <div class="guide-popup-overlay" id="guidePopupOverlay" onclick="closePopup(event)">
        <div class="guide-popup" id="guidePopup" onclick="event.stopPropagation()">
            <div class="guide-popup-icon"><span id="gpIcon"></span></div>
            <div class="guide-popup-body">
                <div class="guide-popup-title" id="gpTitle"></div>
                <div class="guide-popup-desc" id="gpDesc"></div>
                <div class="guide-popup-notice" id="gpNotice" style="display:none;">
                    <span>⚠️</span>
                    <div id="gpNoticeText"></div>
                </div>
            </div>
            <div class="guide-popup-btn-wrap">
                <button class="guide-popup-btn" id="gpBtn" onclick="closePopup()">시작하기</button>
            </div>
        </div>
    </div>

    <script>
        const popupData = {
            step1: {
                icon: '📖',
                title: '1차 풀이를 시작합니다',
                desc: '제한시간 <b>20분</b> 안에 모든 문제를 풀어주세요.',
                notice: '시간이 초과되면 풀던 곳까지 자동 제출됩니다.',
                btn: '시작하기',
                theme: 'theme-purple'
            },
            step2: {
                icon: '🔄',
                title: '2차 풀이를 시작합니다',
                desc: '1차에서 <b>틀린 문제</b>만 다시 풀 수 있습니다.',
                notice: '시간제한은 없으니 천천히 다시 생각해보세요.',
                btn: '시작하기',
                theme: 'theme-blue'
            },
            step3: {
                icon: '📝',
                title: '해설 및 오답노트',
                desc: '해설을 꼼꼼히 읽고,<br><b>오답노트</b>까지 제출해주세요.',
                notice: '오답노트까지 제출해야 <b>100% 인증</b>됩니다!<br>중간에 나가면 인증률이 낮아집니다.',
                btn: '확인했어요',
                theme: 'theme-green'
            }
        };

        function showPopup(step) {
            const data = popupData[step];
            const overlay = document.getElementById('guidePopupOverlay');
            const popup = document.getElementById('guidePopup');

            document.getElementById('gpIcon').textContent = data.icon;
            document.getElementById('gpTitle').textContent = data.title;
            document.getElementById('gpDesc').innerHTML = data.desc;
            document.getElementById('gpBtn').textContent = data.btn;

            // 주의사항
            const noticeEl = document.getElementById('gpNotice');
            if (data.notice) {
                document.getElementById('gpNoticeText').innerHTML = data.notice;
                noticeEl.style.display = 'flex';
            } else {
                noticeEl.style.display = 'none';
            }

            // 테마
            popup.className = 'guide-popup ' + data.theme;

            // 표시
            overlay.classList.add('active');

            // 아이콘 애니메이션 리트리거
            const iconEl = document.getElementById('gpIcon');
            iconEl.style.animation = 'none';
            iconEl.offsetHeight;
            iconEl.style.animation = '';
        }

        function closePopup(e) {
            if (e && e.target !== document.getElementById('guidePopupOverlay')) return;
            document.getElementById('guidePopupOverlay').classList.remove('active');
        }
    </script>

</body>
</html>
