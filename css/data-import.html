// ============================
// Supabase 설정
// ============================
function getConfig() {
    return {
        url: document.getElementById('supabaseUrl').value.trim().replace(/\/$/, ''),
        key: document.getElementById('supabaseKey').value.trim()
    };
}

async function testConnection() {
    const cfg = getConfig();
    const el = document.getElementById('connStatus');
    try {
        const resp = await fetch(`${cfg.url}/rest/v1/tr_reading_fillblanks?select=id&limit=1`, {
            headers: { 'apikey': cfg.key, 'Authorization': `Bearer ${cfg.key}` }
        });
        if (resp.ok) {
            el.className = 'conn-status conn-ok';
            el.textContent = '✅ 연결 성공!';
            log('Supabase 연결 성공', 'success');
        } else if (resp.status === 404) {
            el.className = 'conn-status conn-fail';
            el.textContent = '⚠️ 테이블 없음 - SQL 먼저 실행하세요';
            log(`테이블 없음 (404). supabase-content-tables.sql을 SQL Editor에서 먼저 실행하세요.`, 'error');
        } else {
            el.className = 'conn-status conn-fail';
            el.textContent = `❌ HTTP ${resp.status}`;
            log(`연결 실패: HTTP ${resp.status}`, 'error');
        }
    } catch (e) {
        el.className = 'conn-status conn-fail';
        el.textContent = '❌ 연결 실패';
        log(`연결 실패: ${e.message}`, 'error');
    }
}

// ============================
// Supabase REST API
// ============================
async function supabaseInsert(tableName, rows) {
    const cfg = getConfig();
    const resp = await fetch(`${cfg.url}/rest/v1/${tableName}`, {
        method: 'POST',
        headers: {
            'apikey': cfg.key,
            'Authorization': `Bearer ${cfg.key}`,
            'Content-Type': 'application/json',
            'Prefer': 'return=minimal'
        },
        body: JSON.stringify(rows)
    });
    if (!resp.ok) {
        const text = await resp.text();
        throw new Error(`${resp.status}: ${text}`);
    }
    return true;
}

async function supabaseDelete(tableName) {
    const cfg = getConfig();
    // DELETE with no filter = delete all (Supabase requires a filter, so we use id != '')
    const resp = await fetch(`${cfg.url}/rest/v1/${tableName}?id=neq.____IMPOSSIBLE____`, {
        method: 'DELETE',
        headers: {
            'apikey': cfg.key,
            'Authorization': `Bearer ${cfg.key}`,
            'Prefer': 'return=minimal'
        }
    });
    return resp.ok;
}

// ============================
// CSV 유틸
// ============================
function parseCSVLine(line) {
    const result = [];
    let current = '';
    let inQ = false;
    for (let i = 0; i < line.length; i++) {
        const ch = line[i];
        if (ch === '"' && inQ && line[i+1] === '"') { current += '"'; i++; }
        else if (ch === '"') { inQ = !inQ; }
        else if (ch === ',' && !inQ) { result.push(current); current = ''; }
        else { current += ch; }
    }
    result.push(current);
    return result;
}

function splitCSVRows(csvText) {
    const rows = [];
    let current = '';
    let inQ = false;
    for (let i = 0; i < csvText.length; i++) {
        const ch = csvText[i];
        if (ch === '"') {
            if (inQ && csvText[i+1] === '"') { current += '""'; i++; }
            else { inQ = !inQ; current += ch; }
        } else if ((ch === '\n' || (ch === '\r' && csvText[i+1] === '\n')) && !inQ) {
            if (ch === '\r') i++;
            if (current.trim()) rows.push(current);
            current = '';
        } else { current += ch; }
    }
    if (current.trim()) rows.push(current);
    return rows;
}

async function fetchCSV(sid, gid) {
    const url = `https://docs.google.com/spreadsheets/d/${sid}/export?format=csv&gid=${gid}`;
    const resp = await fetch(url);
    if (!resp.ok) throw new Error(`CSV fetch HTTP ${resp.status}`);
    return await resp.text();
}

function parseFillBlanks(csv) {
    const lines = csv.trim().split('\n'), rows = [];
    for (let i = 1; i < lines.length; i++) {
        const v = parseCSVLine(lines[i].trim());
        if (v.length < 2) continue;
        let id = v[0].trim(); if (!id) continue;
        const m = id.match(/fillblank_set_(\d+)/);
        if (m) id = `fillblank_set_${String(parseInt(m[1])).padStart(4,'0')}`;
        rows.push({ id, passage_with_markers: v[1] });
    }
    return rows;
}

function parseDaily1(csv) {
    const lines = csv.trim().split('\n'), rows = [];
    for (let i = 1; i < lines.length; i++) {
        const v = parseCSVLine(lines[i].trim());
        if (v.length < 8) continue;
        let id = v[0].trim(); if (!id) continue;
        const m = id.match(/daily1_set_(\d+)/); if (m) id = `daily1_set_${String(parseInt(m[1])).padStart(4,'0')}`;
        rows.push({ id, main_title: v[1], passage_title: v[2], passage_content: v[3], sentence_translations: v[4], interactive_words: v[5], question1: v[6], question2: v[7] });
    }
    return rows;
}

    }
    return rows;
}

function parseResponse(csv) {
    const lines = csv.trim().split('\n'), rows = [];
    let lastSetId = '';
    for (let i = 1; i < lines.length; i++) {
        const v = parseCSVLine(lines[i].trim());
        if (v.length < 9) continue;
        let sid = v[0].trim();
        if (!sid && lastSetId) sid = lastSetId;
        if (sid) { lastSetId = sid; if (/^\d+$/.test(sid)) sid = `response_set_${String(sid).padStart(4,'0')}`; }
        if (!sid) continue;
        const qn = parseInt(v[1]) || 1;
        rows.push({ id: `${sid}_q${String(qn).padStart(2,'0')}`, set_id: sid, question_num: qn,
            audio_url: v[2]||'', gender: v[3]||'', option1: v[4]||'', option2: v[5]||'', option3: v[6]||'', option4: v[7]||'',
            answer: parseInt(v[8])||1, script: v[9]||'', script_trans: v[10]||'',
            option_trans1: v[11]||'', option_trans2: v[12]||'', option_trans3: v[13]||'', option_trans4: v[14]||'',
            option_exp1: v[15]||'', option_exp2: v[16]||'', option_exp3: v[17]||'', option_exp4: v[18]||'',
            script_highlights: v[19]||'' });
    }
    return rows;
}

function parseLecture(csv) {
    const lines = csv.trim().split('\n'), rows = [];
    for (let i = 1; i < lines.length; i++) {
        const v = parseCSVLine(lines[i].trim());
        if (v.length < 50) continue;
        let id = v[0].trim(); if (!id) continue;
        if (/^\d+$/.test(id)) id = `lecture_set_${String(id).padStart(4,'0')}`;
        else { const m = id.match(/lecture_set_(\d+)/); if (m) id = `lecture_set_${String(parseInt(m[1])).padStart(4,'0')}`; }
        function driveUrl(u) { if (!u) return ''; const m = u.match(/\/d\/([^/]+)/); return m ? `https://drive.google.com/uc?export=download&id=${m[1]}` : u.trim(); }
        const row = { id, gender: v[1]||'', lecture_title: v[2]||'', narration_url: driveUrl(v[3]), audio_url: driveUrl(v[4]), script: v[5]||'', script_trans: v[6]||'', script_highlights: v[67]||'' };
        [1,2,3,4].forEach((qn,qi) => {
            const b = 7 + qi*15;
            row[`q${qn}_question_text`] = v[b]||''; row[`q${qn}_question_trans`] = v[b+1]||'';
            row[`q${qn}_opt1`] = v[b+2]||''; row[`q${qn}_opt2`] = v[b+3]||''; row[`q${qn}_opt3`] = v[b+4]||''; row[`q${qn}_opt4`] = v[b+5]||'';
            row[`q${qn}_correct_answer`] = parseInt(v[b+6])||1;
            row[`q${qn}_trans1`] = v[b+7]||''; row[`q${qn}_trans2`] = v[b+8]||''; row[`q${qn}_trans3`] = v[b+9]||''; row[`q${qn}_trans4`] = v[b+10]||'';
            row[`q${qn}_exp1`] = v[b+11]||''; row[`q${qn}_exp2`] = v[b+12]||''; row[`q${qn}_exp3`] = v[b+13]||''; row[`q${qn}_exp4`] = v[b+14]||'';
        });
        rows.push(row);
    }
    return rows;
}

function parseArrange(csv) {
    const lines = csv.trim().split('\n'), rows = [];
    for (let i = 1; i < lines.length; i++) {
        const v = parseCSVLine(lines[i].trim());
        if (v.length < 10) continue;
        let sid = v[0].trim(); if (!sid) continue;
        const m = sid.match(/arrange_set_(\d+)/); if (m) sid = `arrange_set_${String(parseInt(m[1])).padStart(4,'0')}`;
        const qn = parseInt(v[1])||1;
        rows.push({ id: `${sid}_q${String(qn).padStart(2,'0')}`, set_id: sid, question_num: qn,
            given_sentence: v[2]||'', given_translation: v[3]||'', correct_answer: v[4]||'', correct_translation: v[5]||'',
            presented_words: v[6]||'', option_words: v[7]||'', end_punctuation: v[8]||'', explanation: v[9]||'', week: v[10]||'', day: v[11]||'' });
    }
    return rows;
}

function parseEmail(csv) {
    const lines = csv.trim().split('\n'), rows = [];
    for (let i = 1; i < lines.length; i++) {
        const v = parseCSVLine(lines[i].trim());
        if (v.length < 20) continue;
        let id = v[0].trim(); if (!id) continue;
        const m = id.match(/email_set_(\d+)/); if (m) id = `email_set_${String(parseInt(m[1])).padStart(4,'0')}`;
        rows.push({ id, scenario: v[1]||'', task: v[2]||'', instruction1: v[3]||'', instruction2: v[4]||'', instruction3: v[5]||'',
            to_recipient: v[6]||'', subject: v[7]||'', sample_answer: v[8]||'',
            bullet1_must: v[9]||'', bullet1_sample: v[10]||'', bullet1_points: v[11]||'', bullet1_key: v[12]||'',
            bullet2_must: v[13]||'', bullet2_sample: v[14]||'', bullet2_points: v[15]||'', bullet2_key: v[16]||'',
            bullet3_must: v[17]||'', bullet3_sample: v[18]||'', bullet3_points: v[19]||'', bullet3_key: v[20]||'' });
    }
    return rows;
}

function parseDiscussion(csv) {
    const lines = csv.trim().split('\n'), rows = [];
    for (let i = 1; i < lines.length; i++) {
        const v = parseCSVLine(lines[i].trim());
        if (v.length < 6) continue;
        let id = v[0].trim(); if (!id) continue;
        const m = id.match(/discussion_set_(\d+)/); if (m) id = `discussion_set_${String(parseInt(m[1])).padStart(4,'0')}`;
        rows.push({ id, class_context: v[1]||'', topic: v[2]||'', student1_opinion: v[3]||'', student2_opinion: v[4]||'', sample_answer: v[5]||'',
            bullet1_sentence: v[6]||'', bullet1_ets: v[7]||'', bullet1_strategy: v[8]||'',
            bullet2_sentence: v[9]||'', bullet2_ets: v[10]||'', bullet2_strategy: v[11]||'',
            bullet3_sentence: v[12]||'', bullet3_ets: v[13]||'', bullet3_strategy: v[14]||'',
            bullet4_sentence: v[15]||'', bullet4_ets: v[16]||'', bullet4_strategy: v[17]||'',
            bullet5_sentence: v[18]||'', bullet5_ets: v[19]||'', bullet5_strategy: v[20]||'' });
    }
    return rows;
}

function parseKoData(csv) {
    const allRows = splitCSVRows(csv), rows = [];
    for (let i = 1; i < allRows.length; i++) {
        const v = parseCSVLine(allRows[i]);
        if (v.length < 3) continue;
        const type = v[0].trim(), setId = v[1].trim(), koText = v[2];
        if (!type || !setId) continue;
        rows.push({ id: `${type}_${setId}`, type, set_id: setId, ko_text: koText });
    }
    return rows;
}

function parseRepeat(csv) {
    const lines = csv.trim().split('\n'), rows = [];
    for (let i = 1; i < lines.length; i++) {
        const v = parseCSVLine(lines[i].trim());
        if (v.length < 10) continue;
        let id = v[0].trim(); if (!id) continue;
        const row = { id, context_text: v[1]||'', narration_audio: v[2]||'', narration_image: v[3]||'' };
        for (let n = 1; n <= 7; n++) {
            const b = 4 + (n-1)*5;
            row[`audio${n}_url`] = v[b]||''; row[`audio${n}_image`] = v[b+1]||''; row[`audio${n}_script`] = v[b+2]||'';
            row[`audio${n}_translation`] = v[b+3]||''; row[`audio${n}_response_time`] = parseInt(v[b+4])||8;
        }
        rows.push(row);
    }
    return rows;
}

function parseInterview(csv) {
    const lines = csv.trim().split('\n'), rows = [];
    for (let i = 1; i < lines.length; i++) {
        const v = parseCSVLine(lines[i].trim());
        if (v.length < 10) continue;
        let id = v[0].trim(); if (!id) continue;
        const row = { id, context_text: v[1]||'', context_translation: v[2]||'', context_audio: v[3]||'', context_image: v[4]||'', nodding_video: v[33]||'' };
        for (let n = 1; n <= 4; n++) {
            const b = 5 + (n-1)*7;
            row[`v${n}_video`] = v[b]||''; row[`v${n}_script`] = v[b+1]||''; row[`v${n}_translation`] = v[b+2]||'';
            row[`v${n}_model_answer`] = v[b+3]||''; row[`v${n}_model_answer_trans`] = v[b+4]||''; row[`v${n}_model_answer_audio`] = v[b+5]||''; row[`v${n}_highlights`] = v[b+6]||'';
        }
        rows.push(row);
    }
    return rows;
}

function parseVocab(csv) {
    const lines = csv.trim().split('\n'), rows = [];
    const usedIds = new Set();
    for (let i = 1; i < lines.length; i++) {
        const v = parseCSVLine(lines[i].trim());
        if (v.length < 2) continue;
        const page = parseInt(v[0])||0, hw = (v[1]||'').trim();
        if (!hw) continue;
        let baseId = `page${page}_${hw.replace(/\s+/g,'_').toLowerCase()}`;
        let id = baseId;
        let dup = 2;
        while (usedIds.has(id)) { id = `${baseId}_${dup++}`; }
        usedIds.add(id);
        rows.push({ id, page, headword: hw,
            synonym1: v[2]||'', synonym2: v[3]||'', synonym3: v[4]||'', synonym4: v[5]||'',
            synonym5: v[6]||'', synonym6: v[7]||'', synonym7: v[8]||'', synonym8: v[9]||'' });
    }
    return rows;
}

function parseSchedule(csv) {
    const lines = csv.trim().split('\n'), rows = [];
    for (let i = 1; i < lines.length; i++) {
        const v = parseCSVLine(lines[i].trim());
        if (v.length < 8) continue;
        const prog = v[0].trim(), week = parseInt(v[1])||1, day = v[2].trim();
        if (!prog || !day) continue;
        rows.push({ id: `${prog.replace(/\s+/g,'_')}_w${week}_${day}`, program: prog, week, day,
            section1: v[3]||'', section2: v[4]||'', section3: v[5]||'', section4: v[6]||'', description: v[7]||'' });
    }
    return rows;
}

const PARSERS = {
    fillblanks: parseFillBlanks, daily1: parseDaily1, daily2: parseDaily2, academic: parseAcademic,
    response: parseResponse, conversation: parseConversation, announcement: parseAnnouncement, lecture: parseLecture,
    arrange: parseArrange, email: parseEmail, discussion: parseDiscussion, kodata: parseKoData,
    repeat: parseRepeat, interview: parseInterview, vocab: parseVocab, schedule: parseSchedule
};

// ============================
// 임포트 로직
// ============================
async function importSheet(sheet) {
    updateStatus(sheet.key, 'loading', '📥 CSV 다운로드중...');
    updateProgress(sheet.key, 0);
    log(`[${sheet.name}] CSV 다운로드 시작...`);

    try {
        const csv = await fetchCSV(sheet.spreadsheetId, sheet.gid);
        log(`[${sheet.name}] CSV ${(csv.length/1024).toFixed(1)} KB 다운로드 완료`);
        updateProgress(sheet.key, 20);

        updateStatus(sheet.key, 'loading', '🔄 파싱중...');
        const rows = PARSERS[sheet.key](csv);
        log(`[${sheet.name}] ${rows.length}행 파싱 완료`, 'success');
        updateProgress(sheet.key, 40);

        if (rows.length === 0) {
            updateStatus(sheet.key, 'skipped', '⚠️ 0행');
            log(`[${sheet.name}] 데이터 없음`, 'warn');
            return 0;
        }

        // Supabase REST API는 배치 INSERT 지원 (배열로 POST)
        // 단, 너무 크면 분할
        const BATCH = 50;
        let inserted = 0;
        for (let j = 0; j < rows.length; j += BATCH) {
            const batch = rows.slice(j, j + BATCH);
            updateStatus(sheet.key, 'loading', `📤 ${j}/${rows.length}...`);
            await supabaseInsert(sheet.table, batch);
            inserted += batch.length;
            updateProgress(sheet.key, 40 + Math.round((inserted/rows.length)*55));
        }

        updateProgress(sheet.key, 100);
        updateStatus(sheet.key, 'success', `✅ ${inserted}행`);
        sheetStatus[sheet.key].rows = inserted;
        log(`[${sheet.name}] ✅ ${inserted}행 삽입 완료!`, 'success');
        return inserted;

    } catch (e) {
        updateStatus(sheet.key, 'error', `❌ ${e.message.substring(0,40)}`);
        log(`[${sheet.name}] ❌ ${e.message}`, 'error');
        return 0;
    }
}

async function importSingle(key) {
    const sheet = SHEETS.find(s => s.key === key);
    if (sheet) await importSheet(sheet);
}

async function importAll() {
    const btn = document.getElementById('btnImportAll');
    btn.disabled = true; btn.textContent = '⏳ 진행중...';
    log('=== 전체 임포트 시작 ===');
    let total = 0, ok = 0, fail = 0;
    for (const s of SHEETS) {
        const n = await importSheet(s);
        total += n;
        if (sheetStatus[s.key].status === 'success') ok++;
        else if (sheetStatus[s.key].status === 'error') fail++;
    }
    log(`=== 완료: ${total}행, 성공 ${ok}, 실패 ${fail} ===`, 'success');
    document.getElementById('summary').style.display = 'block';
    document.getElementById('summary').innerHTML = `✅ <b>${total}</b>행 삽입 | 성공 <b>${ok}</b> | 실패 <b>${fail}</b>`;
    btn.disabled = false; btn.textContent = '🔄 다시 임포트';
}

async function clearAllTables() {
    if (!confirm('모든 tr_ 테이블 데이터를 삭제하시겠습니까?')) return;
    log('=== 전체 초기화 ===', 'warn');
    for (const s of SHEETS) {
        try {
            await supabaseDelete(s.table);
            updateStatus(s.key, 'pending', '대기중');
            log(`[${s.name}] 삭제 완료`, 'warn');
        } catch (e) {
            log(`[${s.name}] 삭제 실패: ${e.message}`, 'error');
        }
    }
}
